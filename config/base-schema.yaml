# OKEngine base schema — the engine-owned universal layer merged UNDER every
# pack's schema.yaml (see scripts/cron/schema_lib.merged_schema). Packs declare
# only their domain types on top; the universal fields and the global toggles
# (okf.required / okf.should, strict_types) live here and are NOT pack-settable
# under composition. Engine-owned — do not edit per deployment.
version: 1

okf:
  required: [type, id]    # universal MUSTs on every page — `id` promoted from WARN to MUST
                          # after the P1 id backfill stamped every page (RFC composable-okpacks §5a)
  should:   []            # WARN tier — empty now that `id` is required

strict_types: false       # engine-owned; packs cannot loosen/tighten under composition

# Universal fields every page MAY carry. Informational only — undeclared extras
# always pass through (the format is open/extensible); this list documents the
# interoperability surface. `id` is the immutable, type-independent identity
# (RFC composable-okpacks §5a): an authority id (<authority>:<localid>) when the
# owning type declares id_authority, else a slug minted once at creation.
common_optional:
  - id
  - title
  - description
  - status
  - created
  - updated
  - version
  - created_by
  - last_modified_by
  - confidence
  - tags
  - aliases          # alternate/legacy ids — the id resolver consults these
  - maintained_by    # provenance: packs that maintain the page (composition)
  - discovered_by    # provenance: where the knowledge was first attributed
  # Cross-cutting OPTIONAL fields (okengine#90 P2) — universally useful, validated by the base
  # enums below, extended by packs. Optional everywhere → composition-safe (never rejects another
  # pack's page). A pack that wants one PRESENT enforces it in its ingest workflow, not the gate.
  - tlp              # data-sharing/handling marker (FIRST.org Traffic Light Protocol — cross-domain)
  - sensitivity      # generic confidentiality marker (alt to tlp)
  - source_kind      # what kind of source (paper / post / release / …)
  - publisher        # source publisher / outlet
  # Ingest provenance (okengine#194) — stamped by feed/API ingest lanes and CARRIED verbatim by the
  # raw->wiki compile (select_raw_batch PROVENANCE_KEYS, cross-checked by test_select_raw_batch).
  # Without these the compile agent treated them as unknown fields and dropped them, so a vault
  # could not be filtered/attributed by ingest source.
  - source_feed      # which feed/API the item arrived from
  - source_channel   # ingest channel kind (feed / api / manual / …)
  - matched_query    # the watch/search query that surfaced the item
  - watch_lane       # which ingest lane pulled it
  - quality_score    # ingest-time quality/relevance score (scheme is the ingester's)
  - reliability      # source-channel reliability (the grading SCHEME is a pack enum)
  - credibility      # claim credibility (scheme is a pack enum)
  - severity         # finding / issue severity

# Base value vocabularies for the cross-cutting fields. Marked `extensible` so a pack ADDS its
# domain values (the extensible-enum grammar) rather than re-declaring the enum. TLP ships its full
# standard set (not extensible — it IS the standard).
enums:
  tlp:        [CLEAR, GREEN, AMBER, "AMBER+STRICT", RED]
  source_kind: [paper, post, release, news, report]
  severity:    [info, low, medium, high, critical]

field_enums:
  tlp:         {enum: tlp}
  source_kind: {enum: source_kind, extensible: true}
  severity:    {enum: severity, extensible: true}

# Declared frontmatter field SHAPES — the enforced write path coerces/validates each field to its
# declared shape at the single write chokepoint, so an agent that authors the wrong shape can't land
# a page that crashes a downstream lane (generalizes the ad-hoc list coercion of okengine#196). Today:
#   list  — a scalar string is split (on commas) into a list, so a list-consuming lane never sees a
#           bare `aliases: A, B`. An unlisted field is free-form (passed through unchanged).
#   int   — a machine-owned COUNT. A digit-string coerces to int; anything else REJECTS the write
#           with the field named, so an agent that misreads the field name semantically (live
#           incident: `recent_reports:` hand-set to a LIST of source paths, which then topped the
#           cockpit's Most-active sort) gets an actionable error instead of poisoning dashboards.
# Packs EXTEND this for their domain fields (a pack key wins on conflict), same as `field_enums`.
field_shapes:
  aliases:       list   # alternate names/ids (id resolver + normalize-bare-name-links consume as list)
  tags:          list
  maintained_by: list   # provenance: packs that maintain the page (composition)
  discovered_by: list   # provenance: where the knowledge was first attributed
  sources:       list   # primary citations — the ref_fields rule + grounding/staleness graph read
                        # these as a list; a scalar `sources: a, b` must split, not land as one blob
                        # (okengine#196's coercion forgot the very field it was for — invariant-audit)
  see_also:      list   # related-page refs (concepts/entities a page maps to)
  related:       list
  refs:          list
  basis:         list   # supporting refs on inference/lacuna pages
  recent_reports: int   # computed activity metric (a pack metrics lane stamps the count) —
                        # agents must not hand-author it; a non-int write REJECTS
  total_mentions: int   # computed mention count — same contract as recent_reports

# ── Core OKF structure (engine-owned) — okengine#90 P2 ──────────────────────
# The universal knowledge-graph spine. ENGINE-owned so it is NOT re-declared per pack, which lets
# multiple packs compose into ONE shared graph (entities/sources/concepts/…) without ownership
# collisions. A pack OWNS only its DOMAIN types (its entity types: model/lab, vulnerability/…);
# it does NOT re-declare these. To add domain fields to a core type, a pack uses the `extends`
# grammar (all core types are `extensible: true`) — see docs/core-types-and-extensions.md.
#
# Merge semantics: these are DEFAULTS — a pack that still declares one of these types/namespaces
# overrides the core copy (so existing single-pack deploys are unchanged); a pack that omits it
# inherits the core copy.
types:
  source:     {required: [type, published], extensible: true}                # a paper / post / feed item
  concept:    {required: [type], extensible: true}                           # a cross-cutting pattern / theme
  prediction: {required: [type, status, confidence, subject, resolves_by], extensible: true}
  finding:    {required: [type, status], extensible: true}                   # human-authored
  dashboard:  {required: [type, title], extensible: true}                    # generated view / index
  briefing:   {required: [type, title, published], extensible: true}         # daily/weekly synthesized brief
  trend:      {required: [type, title, period, direction], extensible: true} # dated, directional shift

partitioning:
  reshard_over: 500
  namespaces:
    entities:    {strategy: by-letter, reshard_by: second-letter}
    sources:     {strategy: by-date, date_field: published, reshard_by: day}
    concepts:    {strategy: by-letter, reshard_by: second-letter}
    predictions: {strategy: flat}
    findings:    {strategy: flat}
    briefings:   {strategy: flat}
    trends:      {strategy: flat}

tier:
  hot_days: 30
  warm_days: 365
  namespaces:
    sources:     {date_field: published, from_path: true}
    entities:    {date_field: updated}
    concepts:    {date_field: updated}
    predictions: {date_field: resolves_by, status_field: status, open_values: [open, active], open_floor: hot}
    findings:    {date_field: updated}
    briefings:   {date_field: published}
    trends:      {date_field: updated}

# Conformance rules — mechanically-checkable CONTENT rules BEYOND field presence/type (those are
# `types`/`okf`). The conformance audit (scripts/cron/conformance_audit.py) checks EXISTING pages
# against these and writes wiki/dashboards/conformance.md; the write-guard will enforce them going
# forward (okengine#158 P2). One source of truth, so a rule can't be enforced-but-unaudited.
# A pack EXTENDS `rules` with its own (composed, additive). Rule kinds:
#   ref_fields  — entries of the named frontmatter LIST fields must be page-paths (contain '/' or
#                 end .md), not prose; a prose entry links nothing (no backlink / graph edge).
# severity: fix (retroactively remediable) | forward-only (can't fabricate the past, informational).
conformance:
  rules:
    - id: source-refs-are-pages
      kind: ref_fields
      fields: [sources]
      severity: fix
      remediation: "relink-prose-sources (deterministic, unique slug match) + entity-backfill (LLM) for the rest; ambiguous prose left flagged"
