# {{PACK}} — pack identity + composition metadata (composable okpacks).
# `validate.py` checks this; at deploy the engine validates the whole composed
# set (disjoint ownership, requires present, single trust level).
name: {{PACK}}
version: 0.1.0
trust: private            # public | private — compose only within one trust level
owns:
  # The types + namespaces THIS pack defines and owns (others may read/link them,
  # but only the owner mutates owned fields). Add your DOMAIN entity types here as
  # you add them to schema.yaml `types:`.
  types: [source, concept, prediction, finding, dashboard]
  namespaces: [sources, concepts, predictions, findings, briefings, entities]
requires: []              # packs this one depends on, e.g. [okpack-base@>=0.1.0]
port_offset: {{PORT_OFFSET}}   # default host-port offset: reader 9200+N, mcp 8730+N.
                          # `framework pull` applies it unless you pass --port-offset.
