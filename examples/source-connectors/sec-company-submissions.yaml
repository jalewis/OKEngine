connector_version: 1
id: reference.sec-company-submissions
name: SEC EDGAR company submissions
description: Keyed company filing-history enrichment from data.sec.gov; CIK must be ten zero-padded digits.
mode: enrichment
trust:
  permission: public
  data_sensitivity: clear
  source_authority: U.S. Securities and Exchange Commission
permissions:
  network: true
  allowed_hosts: [data.sec.gov]
  allow_private_network: false
  write_raw: true
auth: {type: none, secret_refs: {}}
inputs: {required: [cik, user_agent]}
request:
  url: https://data.sec.gov/submissions/CIK${input.cik}.json
  method: GET
  headers:
    User-Agent: "${input.user_agent}"
  query: {}
  timeout_seconds: 30
  max_bytes: 15728640
response:
  format: json
  records_path: ""
  stable_id_path: cik
  revision_path: filings.recent.accessionNumber.0
  deleted_path: deleted
pagination: {type: none, max_pages: 1}
checkpoint: {path: reference.sec-company-submissions.json}
conditional_requests: {enabled: true}
rate_limit: {max_requests: 1, per_seconds: 1}
archive:
  enabled: true
  raw_responses: true
  path: reference.sec-company-submissions
  retention_days: 30
license:
  name: SEC.gov public data and automated-access policy
  url: https://www.sec.gov/search-filings/edgar-application-programming-interfaces
  redistribution: allowed
  max_retention_days: 3650
health: {path: reference.sec-company-submissions.json}
