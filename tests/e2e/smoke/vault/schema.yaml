# okpack-smoke — a minimal, deterministic OKF vault for the render-surface smoke harness.
# NOT a real domain pack: it exists only to exercise the reader/cockpit/mcp render paths with
# hand-authored pages that reproduce the exact shapes that have regressed in production. No feeds,
# no agent lanes, no model — the content is frozen so the assertions are stable.
name: okpack-smoke
trust: public
owns:
  types: [actor, malware, prediction, incident, lacuna, threat-procedure, detection-requirement, detection-strategy, detection-analytic, deployment-snapshot, validation-result, coverage-assessment, defensive-outcome]
  namespaces: [entities, predictions, security-incidents, dashboards, briefings, lacuna, procedures, detection-requirements, detection-strategies, detection-analytics, deployment-snapshots, validation-results, coverage-assessments, defensive-outcomes]

# The cockpit's only domain input. Drives the profile fact-panel ordering, the deck PDF stream,
# the predictions tab, and a curated dashboards grid (so an un-curated NESTED dashboard must land
# in the "Other" catch-all — the M7 regression).
cockpit:
  title: "OKEngine smoke vault"
  tabs: [overview, adversaries, sorted, predictions, tid, dashboards, browse]
  # The `sorted` tab pins the box-engine SORT contract — both live incidents:
  #   - a DATE-sorted box (desc) must show newest first (ISO dates aren't floatable, so the whole
  #     box lives in the non-numeric sort bucket; direction must apply within it — Knowledge-gaps
  #     regression 2026-07-10);
  #   - a NUMERIC-sorted box must rank a malformed value (a list where a count belongs) BELOW every
  #     real number, never at the top (Most-active regression 2026-07-10).
  tab_defs:
    tid:
      label: Detection
      boxes:
        - {title: "Threat-to-defense trace", span: 12, view: tid-trace, empty: "No procedures imported."}
        - {title: "Actor defensive posture", span: 12, view: tid-actor-posture, empty: "No actor posture yet."}
        - {title: "Coverage facets", span: 12, view: tid-facet-matrix, empty: "No coverage assessments yet."}
        - {title: "Detection dossier", span: 12, view: tid-detection-dossier}
        - {title: "Validation queue", span: 12, view: tid-validation-queue}
        - {title: "Gap workbench", span: 12, view: tid-gap-workbench}
    sorted:
      label: Sorted
      boxes:
        - title: Knowledge gaps
          view: table
          dataset: {dir: lacuna, type: lacuna}
          sort: {field: created, desc: true}
          columns:
            - {field: title, label: Gap, link: true}
            - {field: created, label: Found, date: true}
        - title: Most active
          view: table
          dataset: {dir: entities, type: actor}
          sort: {field: recent_reports, desc: true, require: true}
          columns:
            - {field: title, label: Actor, link: true}
            - {field: recent_reports, label: Recent}
  profiles:
    # a type with a profiles order splits into a fact panel; the body must still LEAD the page
    # (the "scattered spider" fix — the fact panel may never render above the prose body).
    actor: [aliases, origin_country, motivation, techniques, attribution_confidence]
  streams:
    - {key: daily,  label: "Daily brief",  dir: briefings, glob: "daily-*",       type: daily-brief}
    - {key: deck,   label: "Weekly deck",  dir: briefings, glob: "weekly-deck-*",  pdf: true}
  predictions: [predictions]
  dashboards:
    - group: "Pinned"
      items:
        - {path: "dashboards/operator", title: "Operator dashboard"}
