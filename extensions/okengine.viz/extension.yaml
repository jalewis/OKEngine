# okengine.viz — strategic/concept-map visualizations over the vault's concept graph (okengine#156).
# Optional presentation layer (hence an extension, not engine machinery — #148). Domain-agnostic:
# lays concepts on an evolution × value-chain plane; axes + nodes come from the vault, no domain
# knowledge. Writes the L1 `dashboard` type under dashboards/ — NO schema fragment (the
# competitive-analytics pattern). no_agent (the origin job was script-only).
id: okengine.viz
kind: operation
version: 0.1.0
name: Visualization (strategic maps)
description: >-
  Generic strategic/concept-map visualizations (Wardley: evolution × value-chain) over the vault's
  concept graph. Axes come from concept `evolution`/`value_chain` fields when enriched, else a
  graph-ubiquity heuristic. Ships only the method; no domain coupling. Runs on any pack.
trust: in-gateway
core: false
requires:
  engine: ">=0.6.0"
capabilities:
  read: ["wiki/**"]
  write: ["dashboards/**",            # the pack-owned `dashboard` type under dashboards/wardley.md
          "concepts/**"]              # concept-enrich fills the axis fields it owns (fragment below)
  network: true                       # concept-enrich calls the local model endpoint via llm_lib
schema:
  - schema/viz.schema.yaml            # EXTENDS core `concept` with the optional axis fields
                                      #   (evolution / value_chain / viz_enriched) — okengine#172
config:
  evolution_field:
    type: string
    default: "evolution"
    description: >-
      Concept frontmatter field for the x (evolution/maturity) axis — Wardley scale
      genesis<custom<product<commodity, or a 0-1/0-100 number. Absent -> graph-ubiquity heuristic.
      Env: OKENGINE_VIZ_EVOLUTION_FIELD.
  value_field:
    type: string
    default: "value_chain"
    description: >-
      Concept frontmatter field for the y (value-chain) axis (0-1/0-100). Absent -> entity-coupling
      heuristic. Env: OKENGINE_VIZ_VALUE_FIELD.
  anchor:
    type: string
    default: ""
    description: >-
      Comma-separated wiki-relative page paths (e.g. a watchlist page). When set, the map scopes
      to the anchors' neighborhood — concepts they link directly plus concepts linked from entities
      they link (1 hop) — instead of the whole vault (which surfaces global hub concepts).
      Percentiles stay global so scoped nodes keep true positions. Cap defaults 35 anchored / 75
      global (WARDLEY_MAX_NODES). Env: OKENGINE_VIZ_ANCHOR.
  enrich_batch:
    type: string
    default: "25"
    description: >-
      Concepts enriched per concept-enrich run (2 llm_lib.classify calls each, ~12s/concept
      on a local mid-size model). Env: OKENGINE_VIZ_ENRICH_BATCH.
  enrich_time_budget:
    type: string
    default: "300"
    description: >-
      Own-clock seconds per concept-enrich run — the lane checkpoints each page and stops
      cleanly at the budget (a host timeout is a kill, not a budget). Env:
      OKENGINE_VIZ_ENRICH_TIME_BUDGET.
operations:
  wardley-refresh:
    schedule: {kind: cron, expr: "20 5 * * *"}      # daily, like the origin job
    entrypoint: build_wardley_map.py                # no_agent (no prompt_file): deterministic generator
  concept-enrich:
    schedule: {kind: cron, expr: "50 4 * * *"}      # daily, BEFORE the 05:20 map so fresh fields land on it
    entrypoint: enrich_concepts.py                  # no_agent drain: llm_lib classify -> frontmatter fill (#172)
    cost_bearing: true                              # calls llm_lib (paid) — budget_guard must pause it (#36)
  panel-svg-refresh:
    schedule: {kind: cron, expr: "45 5 * * *"}      # after the agent dashboard lanes: data -> embedded chart
    entrypoint: render_panel_svgs.py                # no_agent: SVG into any dashboards page with panel: data# No reader_panels type-binding: the generated map page SELF-DECLARES `panel: {kind:
# two-axis}` in its own frontmatter (a per-page panel). Binding all `dashboard` pages would
# misrender the table dashboards; #160's manifest binding is for types that can't self-declare.
